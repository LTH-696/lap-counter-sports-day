<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Track Race Lap Counter</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;-webkit-user-select:none;user-select:none}

#page-setup{width:100%;height:100%;overflow-y:auto;background:#f0f2f5;padding:16px}
#page-setup h1{text-align:center;color:#2c3e50;margin-bottom:16px;font-size:22px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card h3{margin-bottom:10px;color:#2c3e50;font-size:16px}
.presets{display:flex;gap:8px;margin-bottom:14px}
.pre-btn{flex:1;padding:10px 6px;border:none;border-radius:8px;background:#34495e;color:#fff;font-size:13px;font-weight:700;cursor:pointer;text-align:center;line-height:1.3}
.pre-btn.active{background:#e74c3c}
.ig{margin-bottom:10px}
.ig label{display:block;margin-bottom:3px;font-weight:600;font-size:13px;color:#555}
.ig input,.ig select{width:100%;padding:9px;border:1px solid #ddd;border-radius:8px;font-size:15px}
.crow{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.cprev{width:34px;height:34px;border-radius:50%;flex-shrink:0}
.crow select{flex:1;padding:8px;border-radius:6px;border:1px solid #ddd;font-size:14px}
.crow input[type=number]{width:65px;padding:8px;border-radius:6px;border:1px solid #ddd;text-align:center;font-size:14px}
.crow .xbtn{width:34px;height:34px;border:none;background:#e74c3c;color:#fff;border-radius:50%;font-weight:700;cursor:pointer;font-size:15px;flex-shrink:0}
.btn{padding:10px 16px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;color:#fff}
.btn-p{background:#3498db}.btn-g{background:#2ecc71}.btn-d{background:#e74c3c}
.btn-block{display:block;width:100%}
.btn-row{display:flex;gap:8px;margin-top:10px}
.gen-section{margin-top:18px}
.gen-btn{padding:16px;font-size:19px;background:#2ecc71;border:none;border-radius:12px;color:#fff;font-weight:800;width:100%;cursor:pointer}

#page-race{width:100%;height:100%;display:none;flex-direction:column;background:#111827}
.topbar{height:50px;background:#1f2937;display:flex;align-items:center;padding:0 5px;gap:4px;flex-shrink:0;border-bottom:1px solid #374151}
.tb{height:36px;min-width:36px;padding:0 8px;border:none;border-radius:8px;font-size:17px;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb:disabled{opacity:.35;cursor:not-allowed}
.tb.bk{background:#6b7280}.tb.st{background:#10b981}.tb.sp{background:#f59e0b}
.tb.un{background:#ef4444}.tb.ex{background:#3b82f6}
.timer{font-size:20px;font-weight:800;color:#f3f4f6;text-align:center;flex:1;min-width:0;font-variant-numeric:tabular-nums;letter-spacing:.5px}

.grid{flex:1;display:grid;gap:3px;padding:3px;overflow:hidden}
.tile{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;position:relative;-webkit-tap-highlight-color:transparent;overflow:hidden;border:3px solid transparent}
.tile:active{transform:scale(.93)}
.tile.bell{border-color:#fbbf24;box-shadow:inset 0 0 12px rgba(251,191,36,.3)}
.tile.done{opacity:.55}
.tile.done::after{content:'✓';position:absolute;top:3px;right:5px;color:rgba(255,255,255,.8);font-size:inherit}

@keyframes lastlap-blink{
    0%,100%{opacity:1;box-shadow:inset 0 0 12px rgba(251,191,36,.3),0 0 0 0 rgba(251,191,36,0)}
    50%{opacity:.45;box-shadow:inset 0 0 20px rgba(251,191,36,.5),0 0 18px 4px rgba(251,191,36,.6)}
}
.tile.lastlap{animation:lastlap-blink .65s ease-in-out infinite}

@keyframes tap-pop{
    0%{transform:scale(.92);box-shadow:inset 0 0 0 0 rgba(255,255,255,0)}
    40%{transform:scale(1.07);box-shadow:inset 0 0 0 6px rgba(255,255,255,.85)}
    100%{transform:scale(1);box-shadow:inset 0 0 0 0 rgba(255,255,255,0)}
}
.tile.tapped{animation:tap-pop .32s ease-out!important;z-index:10}

.r-num{font-weight:900;line-height:1}
.r-info{font-weight:600;opacity:.85;margin-top:2px}
.r-bell{position:absolute;top:2px;right:4px}
.flash{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.28);opacity:0;pointer-events:none;border-radius:5px;transition:opacity .08s}
.flash.on{opacity:1}

.mo{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;justify-content:center;align-items:center;z-index:1000}
.mbox{background:#fff;color:#333;border-radius:12px;padding:20px;width:90%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.mbox h3{margin-bottom:10px}.mbox p{margin-bottom:14px;color:#555}
.macts{display:flex;gap:8px;justify-content:flex-end}
.ebox{background:#fff;color:#333;border-radius:12px;padding:20px;width:96%;max-width:900px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.rtbl{width:100%;border-collapse:collapse;margin:8px 0}
.rtbl th,.rtbl td{border:1px solid #ddd;padding:5px 7px;text-align:left;font-size:12px}
.rtbl th{background:#f2f2f2;white-space:nowrap}
.rscroll{overflow-x:auto}
.cdot{width:13px;height:13px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}

#toast{position:fixed;top:56px;left:50%;transform:translateX(-50%) translateY(-20px);padding:10px 20px;border-radius:8px;color:#fff;font-weight:700;z-index:2000;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;font-size:14px}
#toast.vis{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.info{background:#3498db}#toast.ok{background:#27ae60}#toast.err{background:#ef4444}#toast.warn{background:#f59e0b}

.audio-init{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:3000;color:#fff;text-align:center;padding:20px}
.audio-init button{margin-top:20px;padding:18px 36px;background:#ef4444;border:none;border-radius:12px;color:#fff;font-size:22px;font-weight:800;cursor:pointer}

.edit-preview-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.edit-cprev{width:44px;height:44px;border-radius:50%;flex-shrink:0;border:2px solid #ddd}
.edit-meta{font-weight:700;font-size:15px}
.edit-sub{font-size:13px;color:#888;font-weight:400}
.edit-acts{display:flex;gap:8px;margin-top:14px;justify-content:space-between}
.pre-edit-hint{text-align:center;padding:8px;color:#94a3b8;font-size:13px;font-style:italic}
</style>
</head>
<body>

<div id="toast"></div>
<div id="audio-init" class="audio-init" style="display:none">
    <h2 style="font-size:24px">🔊 Tap to Enable Sound</h2>
    <p style="margin-top:10px;opacity:.8">Your device needs a tap to unlock audio.</p>
    <button id="audio-init-btn">TAP TO START</button>
</div>

<!-- SETUP PAGE -->
<div id="page-setup">
    <h1>🏃 Track Race Lap Counter</h1>
    <div class="card">
        <h3>Race Settings</h3>
        <div class="presets">
            <button class="pre-btn" data-d="800">800m<br><small>2 laps</small></button>
            <button class="pre-btn" data-d="1500">1500m<br><small>4 laps</small></button>
            <button class="pre-btn active" data-d="3000">3000m<br><small>8 laps</small></button>
        </div>
        <div class="ig"><label>Lap Length (m)</label><input type="number" id="inp-lap" value="400" min="100"></div>
        <div class="ig"><label>Race Distance (m)</label><input type="number" id="inp-dist" value="3000" min="200"></div>
    </div>
    <div class="card">
        <h3>Runner Groups</h3>
        <div id="color-rows"></div>
        <div class="btn-row"><button class="btn btn-p" id="add-color-btn" style="flex:1">+ Add Color Group</button></div>
    </div>
    <div class="gen-section">
        <button class="gen-btn" id="gen-btn">Generate Runners →</button>
    </div>
</div>

<!-- RACE PAGE -->
<div id="page-race">
    <div class="topbar">
        <button class="tb bk" id="btn-back">←</button>
        <button class="tb st" id="btn-start">▶</button>
        <div class="timer" id="timer">00:00.0</div>
        <button class="tb un" id="btn-undo" disabled>↩</button>
        <button class="tb sp" id="btn-stop" disabled>⏹</button>
        <button class="tb ex" id="btn-export">📊</button>
    </div>
    <div id="pre-edit-hint" class="pre-edit-hint">Tap a runner to edit number or delete</div>
    <div class="grid" id="grid"></div>
</div>

<!-- CONFIRM -->
<div id="cmod" class="mo" style="display:none">
    <div class="mbox">
        <h3 id="ctitle">Confirm</h3>
        <p id="cmsg">Are you sure?</p>
        <div class="macts">
            <button class="btn" style="background:#9ca3af" id="ccancel">Cancel</button>
            <button class="btn btn-d" id="cok">Confirm</button>
        </div>
    </div>
</div>

<!-- EDIT RUNNER -->
<div id="editmod" class="mo" style="display:none">
    <div class="mbox">
        <h3>Edit Runner</h3>
        <div class="edit-preview-row">
            <div class="edit-cprev" id="edit-cprev"></div>
            <div>
                <div class="edit-meta" id="edit-cname"></div>
                <div class="edit-sub" id="edit-clabel"></div>
            </div>
        </div>
        <div class="ig">
            <label>Runner Number</label>
            <input type="number" id="edit-num" min="1" max="999">
        </div>
        <div class="edit-acts">
            <button class="btn btn-d" id="edit-del">🗑 Delete</button>
            <div style="display:flex;gap:8px">
                <button class="btn" style="background:#9ca3af" id="edit-cancel">Cancel</button>
                <button class="btn btn-g" id="edit-save">Save</button>
            </div>
        </div>
    </div>
</div>

<!-- EXPORT -->
<div id="emod" class="mo" style="display:none">
    <div class="ebox">
        <h2 style="margin-bottom:12px">📊 Race Results</h2>
        <div id="econtent"></div>
        <div class="macts" style="margin-top:14px;flex-wrap:wrap;gap:8px">
            <button class="btn" style="background:#9ca3af" id="eclose">Close</button>
            <button class="btn btn-p" id="ecopy">Copy Text</button>
            <button class="btn btn-g" id="edl">Download HTML</button>
        </div>
    </div>
</div>

<script>
(function(){
'use strict';

var COLORS=[
    {n:'Red',v:'#ef4444'},{n:'Blue',v:'#3b82f6'},{n:'Green',v:'#22c55e'},
    {n:'Yellow',v:'#eab308'},{n:'Purple',v:'#a855f7'},{n:'Orange',v:'#f97316'},
    {n:'Teal',v:'#14b8a6'},{n:'Navy',v:'#1e3a5f'},{n:'Pink',v:'#ec4899'},
    {n:'Brown',v:'#92400e'}
];
var PRESETS={800:{laps:2,m:[400,800]},1500:{laps:4,m:[300,700,1100,1500]},3000:{laps:8,m:[200,600,1000,1400,1800,2200,2600,3000]}};
var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;

var runners=[],rMap=new Map(),raceStart=null,racing=false,paused=false,raceEnd=null;
var totalLaps=0,distMarkers=[],history=[],arrival={};
var colorCnt=0,confirmCb=null,timerRAF=null,toastTm=null,resizeTm=null;
var audioCtx=null,audioOK=false,editingId=null;

var $=function(id){return document.getElementById(id);};
var pageS=$('page-setup'),pageR=$('page-race'),gridEl=$('grid'),timerEl=$('timer');
var crowsEl=$('color-rows');
var btnStart=$('btn-start'),btnStop=$('btn-stop'),btnUndo=$('btn-undo');

function fmt(s){if(s==null||isNaN(s))return'--';var m=Math.floor(s/60),sec=Math.floor(s%60),ms=Math.floor((s%1)*10);return(m<10?'0':'')+m+':'+(sec<10?'0':'')+sec+'.'+ms;}
function cName(hex){for(var i=0;i<COLORS.length;i++)if(COLORS[i].v===hex)return COLORS[i].n;return hex;}
function txtCol(hex){var r=parseInt(hex.substr(1,2),16),g=parseInt(hex.substr(3,2),16),b=parseInt(hex.substr(5,2),16);return(r*299+g*587+b*114)/1000>160?'#1a1a1a':'#ffffff';}

function toast(msg,t){$('toast').textContent=msg;$('toast').className='vis '+(t||'info');if(toastTm)clearTimeout(toastTm);toastTm=setTimeout(function(){$('toast').className='';},2200);}
function confirm2(title,msg,cb){$('ctitle').textContent=title;$('cmsg').textContent=msg;confirmCb=cb;$('cmod').style.display='flex';}

/* AUDIO */
function initAudio(){if(audioOK)return;try{var A=window.AudioContext||window.webkitAudioContext;if(!A)return;audioCtx=new A();var o=audioCtx.createOscillator(),g=audioCtx.createGain();g.gain.value=.001;o.connect(g);g.connect(audioCtx.destination);o.start(0);o.stop(.1);audioOK=true;}catch(e){}}
function tone(f,d,t){if(!audioCtx)return;try{if(audioCtx.state==='suspended')audioCtx.resume();var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=f;o.type=t||'sine';var n=audioCtx.currentTime;g.gain.setValueAtTime(0,n);g.gain.linearRampToValueAtTime(.25,n+.01);g.gain.exponentialRampToValueAtTime(.001,n+d);o.start(n);o.stop(n+d);}catch(e){}}
function vib(p){if(navigator.vibrate)try{navigator.vibrate(p);}catch(e){}}
function fb(type){switch(type){case'advance':vib([80]);tone(660,.12);break;case'bell':vib([200,80,200]);tone(800,.3);setTimeout(function(){tone(1000,.2);},150);break;case'finish':vib([300,100,300]);tone(600,.2,'triangle');setTimeout(function(){tone(800,.2,'triangle');},200);setTimeout(function(){tone(1000,.4,'triangle');},400);break;case'start':vib([150,50,300]);tone(440,.15);setTimeout(function(){tone(880,.3);},200);break;case'stop':vib([500]);tone(880,.15);setTimeout(function(){tone(440,.3);},150);break;case'undo':vib([50,30,50]);tone(440,.1,'square');break;case'error':vib([80,40,80]);tone(200,.3,'sawtooth');break;}}

/* RACE PARAMS */
function updateParams(){
    var d=parseInt($('inp-dist').value);
    if(PRESETS[d]){totalLaps=PRESETS[d].laps;distMarkers=PRESETS[d].m.slice();}
    else{var ll=parseInt($('inp-lap').value);totalLaps=Math.ceil(d/ll);distMarkers=[];for(var i=1;i<=totalLaps;i++)distMarkers.push(Math.min(i*ll,d));}
}

/* COLOR ROWS */
function addCRow(defV,defC){
    colorCnt++;var id=colorCnt,def=defV?COLORS.find(function(c){return c.v===defV;}):COLORS[(id-1)%COLORS.length];
    if(!def)def=COLORS[0];
    var row=document.createElement('div');row.className='crow';row.id='cr-'+id;
    var pv=document.createElement('div');pv.className='cprev';pv.style.backgroundColor=def.v;
    var sel=document.createElement('select');
    for(var i=0;i<COLORS.length;i++){var o=document.createElement('option');o.value=COLORS[i].v;o.textContent=COLORS[i].n;if(COLORS[i].v===def.v)o.selected=true;sel.appendChild(o);}
    sel.addEventListener('change',function(){pv.style.backgroundColor=sel.value;});
    var cnt=document.createElement('input');cnt.type='number';cnt.min='1';cnt.max='99';cnt.value=defC||'1';
    var rm=document.createElement('button');rm.className='xbtn';rm.textContent='✕';
    rm.addEventListener('click',function(){crowsEl.removeChild(row);});
    row.appendChild(pv);row.appendChild(sel);row.appendChild(cnt);row.appendChild(rm);
    crowsEl.appendChild(row);row._s=sel;row._c=cnt;
}

function genRunners(){
    var rows=crowsEl.querySelectorAll('.crow'),nr=[];
    for(var i=0;i<rows.length;i++){
        var color=rows[i]._s.value,count=parseInt(rows[i]._c.value);
        if(!count||count<1||count>99){toast('Enter 1-99 per group','err');fb('error');return;}
        for(var j=1;j<=count;j++){
            nr.push({id:'r'+Date.now()+'-'+i+'-'+j,num:j,color:color,laps:0,lapTimes:[],st:null,ft:null,sort:i*1000+j});
        }
    }
    if(!nr.length){toast('Add at least one group','err');fb('error');return;}
    runners=nr;rMap.clear();
    for(var k=0;k<runners.length;k++)rMap.set(runners[k].id,runners[k]);
    runners.sort(function(a,b){return a.sort-b.sort;});
    updateParams();
    arrival={};for(var l=0;l<=totalLaps;l++)arrival[l]=[];
    history=[];
    racing=false;paused=false;raceStart=null;raceEnd=null;
    btnStart.textContent='▶';btnStart.style.background='#10b981';
    btnStop.disabled=true;btnUndo.disabled=true;
    showRace();
}

/* NAV */
function showRace(){
    pageS.style.display='none';pageR.style.display='flex';
    updateHint();renderGrid();
    window.addEventListener('resize',onResize);
}
function goBack(){
    if(racing&&!paused){confirm2('Leave Race?','Race is in progress. Go back?',doBack);return;}
    doBack();
}
function doBack(){
    stopTimer();racing=false;paused=false;raceStart=null;raceEnd=null;
    for(var i=0;i<runners.length;i++){var r=runners[i];r.laps=0;r.lapTimes=[];r.st=null;r.ft=null;}
    arrival={};history=[];
    timerEl.textContent='00:00.0';
    pageR.style.display='none';pageS.style.display='block';
    window.removeEventListener('resize',onResize);
}
function onResize(){clearTimeout(resizeTm);resizeTm=setTimeout(renderGrid,80);}
function updateHint(){$('pre-edit-hint').style.display=racing?'none':'block';}

/* GRID */
function calcCols(n,w,h){
    var best=1,bestS=0;
    for(var c=1;c<=n;c++){
        var r=Math.ceil(n/c),cw=(w-3*(c+1))/c,ch=(h-3*(r+1))/r;
        var s=Math.min(cw,ch);
        if(s>bestS){bestS=s;best=c;}
    }
    return best;
}

function positions(){
    var list=runners.slice();
    list.sort(function(a,b){
        if(a.ft&&b.ft)return(a.ft-a.st)-(b.ft-b.st);
        if(a.ft&&!b.ft)return-1;if(!a.ft&&b.ft)return 1;
        if(a.laps!==b.laps)return b.laps-a.laps;
        var oa=arrival[a.laps]||[],ob=arrival[b.laps]||[];
        return oa.indexOf(a.id)-ob.indexOf(b.id);
    });
    var m={};for(var i=0;i<list.length;i++)m[list[i].id]=i+1;return m;
}

function renderGrid(){
    var n=runners.length;
    if(!n){gridEl.innerHTML='<div style="color:#666;text-align:center;padding:40px">No runners. Go back to add some.</div>';return;}
    var w=gridEl.clientWidth,h=gridEl.clientHeight;
    if(w<10||h<10)return;
    var cols=calcCols(n,w,h),rows=Math.ceil(n/cols);
    gridEl.style.gridTemplateColumns='repeat('+cols+',1fr)';
    gridEl.style.gridTemplateRows='repeat('+rows+',1fr)';

    var cellW=(w-3*(cols+1))/cols,cellH=(h-3*(rows+1))/rows;
    var md=Math.min(cellW,cellH);
    var numFS=Math.max(14,Math.floor(md*.36));
    var infoFS=Math.max(8,Math.floor(md*.14));
    var bellFS=Math.max(10,Math.floor(md*.2));
    var br=Math.max(4,Math.floor(md*.08));

    var frag=document.createDocumentFragment();

    for(var i=0;i<n;i++){
        var r=runners[i],tc=txtCol(r.color);
        var remaining=totalLaps-r.laps;
        var isBell=racing&&!r.ft&&remaining<=2&&remaining>0;
        var isLastLap=racing&&!r.ft&&remaining<=1&&remaining>0;

        var tile=document.createElement('div');
        tile.className='tile';tile.dataset.id=r.id;
        tile.style.backgroundColor=r.color;tile.style.color=tc;
        tile.style.borderRadius=br+'px';

        if(r.ft)tile.classList.add('done');
        if(isBell)tile.classList.add('bell');
        if(isLastLap)tile.classList.add('lastlap');

        // Bell icon top-right for last 2 laps
        if(isBell){
            var bellIcon=document.createElement('div');
            bellIcon.className='r-bell';
            bellIcon.style.fontSize=bellFS+'px';
            bellIcon.textContent='🔔';
            tile.appendChild(bellIcon);
        }

        // Runner number
        var nm=document.createElement('div');nm.className='r-num';nm.style.fontSize=numFS+'px';
        nm.textContent=r.num;tile.appendChild(nm);

        // Info line
        var info=document.createElement('div');info.className='r-info';info.style.fontSize=infoFS+'px';
        if(r.ft){
            info.textContent=fmt((r.ft-r.st)/1000);info.style.fontWeight='800';
        } else if(racing&&r.laps>0){
            if(isLastLap){
                info.textContent='🔔 LAST!';info.style.fontWeight='800';
            } else if(isBell){
                info.textContent='🔔 '+r.laps+'/'+totalLaps;
            } else {
                info.textContent=r.laps+'/'+totalLaps;
            }
        } else if(!racing){
            info.textContent=cName(r.color);info.style.opacity='.6';
        }
        tile.appendChild(info);

        // Flash overlay for tap feedback
        var fl=document.createElement('div');fl.className='flash';tile.appendChild(fl);
        frag.appendChild(tile);
    }
    gridEl.innerHTML='';gridEl.appendChild(frag);
}

/* TAP FEEDBACK */
function tapFeedback(id){
    var el=gridEl.querySelector('[data-id="'+id+'"]');
    if(!el)return;
    el.classList.add('tapped');
    var fl=el.querySelector('.flash');
    if(fl){fl.classList.add('on');setTimeout(function(){fl.classList.remove('on');},220);}
    setTimeout(function(){if(el)el.classList.remove('tapped');},350);
}

/* EDIT RUNNER (pre-race) */
function openEdit(id){
    var r=rMap.get(id);if(!r)return;
    editingId=id;
    $('edit-cprev').style.backgroundColor=r.color;
    $('edit-cname').textContent=cName(r.color)+' Team';
    $('edit-clabel').textContent='Runner #'+r.num;
    $('edit-num').value=r.num;
    $('editmod').style.display='flex';
    setTimeout(function(){$('edit-num').focus();$('edit-num').select();},120);
}
function saveEdit(){
    if(!editingId)return;
    var r=rMap.get(editingId);
    if(!r){$('editmod').style.display='none';editingId=null;return;}
    var v=parseInt($('edit-num').value);
    if(isNaN(v)||v<1){toast('Enter a valid number','err');return;}
    r.num=v;
    editingId=null;$('editmod').style.display='none';
    renderGrid();toast('Updated to #'+v,'ok');
}
function deleteEdit(){
    if(!editingId)return;
    var r=rMap.get(editingId);
    var label=r?cName(r.color)+' #'+r.num:'Runner';
    runners=runners.filter(function(x){return x.id!==editingId;});
    rMap.delete(editingId);
    editingId=null;$('editmod').style.display='none';
    renderGrid();toast(label+' deleted','ok');
}

/* RACE */
function startRace(){
    if(racing&&!paused)return;
    if(paused){toast('Race ended','warn');return;}
    if(!runners.length){toast('No runners','err');fb('error');return;}
    raceStart=Date.now();racing=true;paused=false;raceEnd=null;
    arrival={};for(var l=0;l<=totalLaps;l++)arrival[l]=[];
    history=[];
    for(var i=0;i<runners.length;i++){
        var r=runners[i];r.st=raceStart;r.laps=1;r.lapTimes=[];r.ft=null;
        if(!arrival[1])arrival[1]=[];arrival[1].push(r.id);
    }
    fb('start');
    btnStart.textContent='●';btnStart.style.background='#6b7280';
    btnStop.disabled=false;btnUndo.disabled=true;
    updateHint();startTimer();renderGrid();
}

function advance(id,tileEl){
    if(!racing||paused)return;
    var r=rMap.get(id);if(!r)return;
    if(r.ft){toast('#'+r.num+' already finished','warn');fb('error');return;}

    var now=Date.now();
    var lapStart=r.lapTimes.length>0?r.st+r.lapTimes.reduce(function(a,b){return a+b;},0):r.st;
    r.lapTimes.push(now-lapStart);

    var undo={id:r.id,prev:r.laps,wasDone:false};
    var arr=arrival[r.laps];if(arr){var ix=arr.indexOf(r.id);if(ix!==-1)arr.splice(ix,1);}

    r.laps++;
    if(r.laps>=totalLaps){r.laps=totalLaps;r.ft=now;undo.wasDone=true;}
    if(!arrival[r.laps])arrival[r.laps]=[];
    arrival[r.laps].push(r.id);

    history.push(undo);btnUndo.disabled=false;

    if(r.ft)fb('finish');
    else if(totalLaps-r.laps<=1)fb('bell');
    else fb('advance');

    renderGrid();
    tapFeedback(id);
}

function undoLast(){
    if(!history.length||paused)return;
    var u=history.pop();var r=rMap.get(u.id);
    if(!r){btnUndo.disabled=!history.length;return;}
    if(r.lapTimes.length)r.lapTimes.pop();
    if(u.wasDone)r.ft=null;
    var cur=arrival[r.laps];if(cur){var ix=cur.indexOf(r.id);if(ix!==-1)cur.splice(ix,1);}
    r.laps=u.prev;
    if(!arrival[r.laps])arrival[r.laps]=[];
    if(arrival[r.laps].indexOf(r.id)===-1)arrival[r.laps].push(r.id);
    btnUndo.disabled=!history.length;
    fb('undo');renderGrid();
}

function stopRace(){
    if(!racing||paused)return;
    raceEnd=Date.now();paused=true;stopTimer();
    fb('stop');
    btnStop.disabled=true;btnUndo.disabled=true;
    confirm2('Auto-finish?','Finish all runners still on course?',function(){
        for(var i=0;i<runners.length;i++){if(!runners[i].ft)runners[i].ft=raceEnd;}
        renderGrid();
    });
    renderGrid();
}

/* TIMER */
function updateTimer(){if(!racing)return;var e=paused&&raceEnd?(raceEnd-raceStart)/1000:(Date.now()-raceStart)/1000;timerEl.textContent=fmt(e);}
function startTimer(){function t(){updateTimer();timerRAF=requestAnimationFrame(t);}timerRAF=requestAnimationFrame(t);}
function stopTimer(){if(timerRAF){cancelAnimationFrame(timerRAF);timerRAF=null;}updateTimer();}

/* EXPORT */
function genHTML(){
    var rd=parseInt($('inp-dist').value),dur=((raceEnd||Date.now())-raceStart)/1000,d=new Date();
    var h='<div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:14px;font-size:13px;color:#666"><div>Event: '+rd+'m</div><div>Date: '+d.toLocaleDateString()+'</div><div>Duration: '+fmt(dur)+'</div><div>Runners: '+runners.length+'</div></div>';
    var fin=runners.filter(function(r){return!!r.ft;}).sort(function(a,b){return(a.ft-a.st)-(b.ft-b.st);});
    if(fin.length){
        var ml=0;for(var i=0;i<fin.length;i++)if(fin[i].lapTimes.length>ml)ml=fin[i].lapTimes.length;
        h+='<h3>Finishers ('+fin.length+')</h3><div class="rscroll"><table class="rtbl"><thead><tr><th>Pos</th><th>Color</th><th>#</th>';
        for(var lp=1;lp<=ml;lp++){var dm=lp<=distMarkers.length?distMarkers[lp-1]:'';h+='<th>L'+lp+(dm?' ('+dm+'m)':'')+'</th>';}
        h+='<th>Total</th><th>Pace/km</th></tr></thead><tbody>';
        for(i=0;i<fin.length;i++){
            var r=fin[i],t=(r.ft-r.st)/1000,pace=t/(rd/1000);
            h+='<tr><td>'+(i+1)+'</td><td><span class="cdot" style="background:'+r.color+'"></span>'+cName(r.color)+'</td><td>'+r.num+'</td>';
            var cum=0;for(lp=0;lp<ml;lp++){if(lp<r.lapTimes.length){var ls=r.lapTimes[lp]/1000;cum+=ls;h+='<td>'+fmt(ls)+'<br><small style="color:#999">'+fmt(cum)+'</small></td>';}else h+='<td>--</td>';}
            h+='<td><strong>'+fmt(t)+'</strong></td><td>'+fmt(pace)+'</td></tr>';
        }
        h+='</tbody></table></div>';
        var tm={};for(i=0;i<fin.length;i++){r=fin[i];if(!tm[r.color])tm[r.color]={n:cName(r.color),c:r.color,cnt:0,t:0};tm[r.color].cnt++;tm[r.color].t+=(r.ft-r.st)/1000;}
        var ta=Object.values(tm).sort(function(a,b){return a.t/a.cnt-b.t/b.cnt;});
        if(ta.length>1){h+='<h3>Teams</h3><table class="rtbl"><thead><tr><th>Pos</th><th>Team</th><th>#</th><th>Avg</th></tr></thead><tbody>';for(i=0;i<ta.length;i++)h+='<tr><td>'+(i+1)+'</td><td><span class="cdot" style="background:'+ta[i].c+'"></span>'+ta[i].n+'</td><td>'+ta[i].cnt+'</td><td>'+fmt(ta[i].t/ta[i].cnt)+'</td></tr>';h+='</tbody></table>';}
    }
    var dnf=runners.filter(function(r){return!r.ft;}).sort(function(a,b){return b.laps-a.laps||a.num-b.num;});
    if(dnf.length){
        var ml2=0;for(i=0;i<dnf.length;i++)if(dnf[i].lapTimes.length>ml2)ml2=dnf[i].lapTimes.length;
        h+='<h3>DNF ('+dnf.length+')</h3><div class="rscroll"><table class="rtbl"><thead><tr><th>Color</th><th>#</th><th>Laps</th>';
        for(lp=1;lp<=ml2;lp++)h+='<th>L'+lp+'</th>';
        h+='</tr></thead><tbody>';
        for(i=0;i<dnf.length;i++){r=dnf[i];h+='<tr><td><span class="cdot" style="background:'+r.color+'"></span>'+cName(r.color)+'</td><td>'+r.num+'</td><td>'+r.laps+'</td>';
        var cm2=0;for(lp=0;lp<ml2;lp++){if(lp<r.lapTimes.length){var s2=r.lapTimes[lp]/1000;cm2+=s2;h+='<td>'+fmt(s2)+'<br><small style="color:#999">'+fmt(cm2)+'</small></td>';}else h+='<td>--</td>';}h+='</tr>';}
        h+='</tbody></table></div>';
    }
    return h;
}
function showExport(){if(!raceStart){toast('No race data','warn');return;}$('econtent').innerHTML=genHTML();$('emod').style.display='flex';}
function copyText(){
    var rd=$('inp-dist').value,txt=rd+'m Race Results\n'+new Date().toLocaleDateString()+'\n\n';
    var fin=runners.filter(function(r){return!!r.ft;}).sort(function(a,b){return(a.ft-a.st)-(b.ft-b.st);});
    if(fin.length){txt+='FINISHERS:\n';for(var i=0;i<fin.length;i++){var r=fin[i];txt+=(i+1)+'. '+cName(r.color)+' #'+r.num+' - '+fmt((r.ft-r.st)/1000);if(r.lapTimes.length){txt+=' | Laps: ';var p=[];for(var j=0;j<r.lapTimes.length;j++)p.push(fmt(r.lapTimes[j]/1000));txt+=p.join(', ');}txt+='\n';}}
    var dnf=runners.filter(function(r){return!r.ft;});
    if(dnf.length){txt+='\nDNF:\n';for(i=0;i<dnf.length;i++){r=dnf[i];txt+=cName(r.color)+' #'+r.num+' - Lap '+r.laps+'\n';}}
    navigator.clipboard.writeText(txt).then(function(){toast('Copied!','ok');}).catch(function(){toast('Copy failed','err');});
}
function dlHTML(){
    var rd=$('inp-dist').value;
    var css='body{font-family:Arial,sans-serif;max-width:900px;margin:0 auto;padding:20px}h2,h3{color:#2c3e50}.rtbl{width:100%;border-collapse:collapse;margin:8px 0}.rtbl th,.rtbl td{border:1px solid #ddd;padding:5px 7px;text-align:left;font-size:12px}.rtbl th{background:#f2f2f2}.rscroll{overflow-x:auto}.cdot{width:13px;height:13px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}';
    var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+rd+'m Results</title><style>'+css+'</style></head><body><h2>'+rd+'m Race Results</h2>'+genHTML()+'</body></html>';
    var b=new Blob([html],{type:'text/html'}),u=URL.createObjectURL(b),a=document.createElement('a');
    a.href=u;a.download=rd+'m_results.html';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
}

    b.addEventListener('click',function(){
        document.querySelectorAll('.pre-btn').forEach(function(x){x.classList.remove('active');});
        b.classList.add('active');
        var d=parseInt(b.dataset.d);$('inp-dist').value=d;
        if(PRESETS[d])$('inp-lap').value=400;
    });
});

$('add-color-btn').addEventListener('click',function(){addCRow();});
$('gen-btn').addEventListener('click',genRunners);

$('btn-back').addEventListener('click',goBack);
$('btn-start').addEventListener('click',startRace);
$('btn-stop').addEventListener('click',stopRace);
$('btn-undo').addEventListener('click',undoLast);
$('btn-export').addEventListener('click',showExport);

/* Grid tap — edit before race, advance during race */
gridEl.addEventListener('click',function(e){
    var tile=e.target.closest('.tile');if(!tile)return;
    var id=tile.dataset.id;if(!id)return;
    if(!racing){openEdit(id);return;}
    if(paused)return;
    advance(id,tile);
});

/* Confirm modal */
$('ccancel').addEventListener('click',function(){$('cmod').style.display='none';confirmCb=null;});
$('cok').addEventListener('click',function(){$('cmod').style.display='none';if(confirmCb)confirmCb();confirmCb=null;});

/* Edit modal */
$('edit-cancel').addEventListener('click',function(){$('editmod').style.display='none';editingId=null;});
$('edit-save').addEventListener('click',saveEdit);
$('edit-del').addEventListener('click',deleteEdit);
$('edit-num').addEventListener('keydown',function(e){if(e.key==='Enter')saveEdit();});

/* Export modal */
$('eclose').addEventListener('click',function(){$('emod').style.display='none';});
$('ecopy').addEventListener('click',copyText);
$('edl').addEventListener('click',dlHTML);

document.addEventListener('click',function f(){if(!audioOK)initAudio();document.removeEventListener('click',f);});

addCRow('#ef4444','1');
addCRow('#22c55e','1');
if(isIOS)setTimeout(function(){$('audio-init').style.display='flex';},800);
else initAudio();

})();
